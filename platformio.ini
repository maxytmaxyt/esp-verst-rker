[env:nodemcu-32s]
platform = espressif32@5.4.0
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
board_build.f_cpu = 240000000L

build_flags =
    -D CONFIG_LWIP_IP_FORWARD=1
    -D CONFIG_LWIP_IPV4_NAPT=1
    -D CONFIG_LWIP_L2_TO_L3_COPY=1
    -D IP_NAPT_MAX=512
    -D IP_PORT_MAX=512

lib_ldf_mode = deep+
