; PlatformIO Project Configuration File
; ESP32 NAT Router / Repeater Professional Setup

[platformio]
default_envs = nodemcu-32s
description = Professional ESP32 WiFi Repeater with Web Config and NAPT

[env:nodemcu-32s]
; --- Core Settings ---
platform = espressif32
board = nodemcu-32s
framework = arduino

; --- Speed Settings ---
; Standard is 160MHz, 240MHz is max performance for routing
board_build.f_cpu = 240000000L
monitor_speed = 115200
upload_speed = 921600

; --- Partition Mapping ---
; Standard partitions might be too small for big web interfaces.
; 'huge_app' gives you ~3MB for your code, but disables OTA (Over-the-Air)
board_build.partitions = huge_app.csv

; --- Build Flags (The Secret Sauce) ---
build_flags =
    ; Enable NAPT (Network Address Port Translation) support
    -D IP_NAPT=1
    -D LWIP_FEATURES=1
    -D LWIP_IPV4=1
    ; Clean up serial output in production (optional)
    -D CORE_DEBUG_LEVEL=3 

; --- Library Dependencies ---
lib_deps =
    ; No external libs needed for this core project yet, 
    ; but you can add things like 'bblanchon/ArduinoJson' here if you expand the Web API.

; --- File System (SPIFFS/LittleFS) ---
; Useful if you want to store your HTML files separately from main.cpp
board_build.filesystem = littlefs

; --- Advanced Scripting / Debugging ---
; This helps the compiler find the hidden lwip headers in some framework versions
build_type = release

; --- Monitor Filter ---
; Makes the serial monitor output much more readable (adds timestamps and colors)
monitor_filters = 
    esp32_exception_decoder
    colorize
    time
