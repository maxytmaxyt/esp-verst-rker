name: ESP32 Build & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Berechtigungen setzen, damit das Action-Token Tags pushen und Releases erstellen darf
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Wichtig für Tagging

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Validate Project Configuration
        run: pio project config

      - name: Build Firmware
        run: pio run -e esp32

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-repeater-firmware
          path: .pio/build/esp32/firmware.bin
          if-no-files-found: error

      # Schritt zum Generieren eines automatischen Tags
      - name: Generate Tag Name
        id: tagger
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          TAG_NAME="v$(date +'%Y.%m.%d')-${{ github.run_number }}"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Neuer Tag: $TAG_NAME"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          tag_name: ${{ steps.tagger.outputs.tag }}
          name: Release ${{ steps.tagger.outputs.tag }}
          files: .pio/build/esp32/firmware.bin
          generate_release_notes: true
