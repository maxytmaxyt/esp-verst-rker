name: ESP32 Build & Release

# Trigger: Push to main branch, Pull Requests, or Manual trigger
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      # --- NEU: Validierung der platformio.ini ---
      - name: Validate Project Configuration
        run: pio project config

      # --- NEU: Statische Code-Analyse (Check) ---
      - name: Static Code Analysis
        run: pio check

      - name: Run PlatformIO Build
        run: pio run

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-repeater-firmware
          # Der Pfad zur fertigen Binärdatei
          path: .pio/build/nodemcu-32s/firmware.bin
          if-no-files-found: error
